function applyTitleChange(roster, tc) {

});
}

function h(tag, attrs, …children) {
const el = document.createElement(tag);
if(attrs) for(const [k,v] of Object.entries(attrs)) {
if(k===‘style’&&typeof v===‘object’) Object.assign(el.style,v);
else if(k.startsWith(‘on’)&&typeof v===‘function’) el.addEventListener(k.slice(2).toLowerCase(),v);
else if(k===‘cls’) el.className=v;
else if(k===‘html’) el.innerHTML=v;
else el.setAttribute(k,v);
}
for(const c of children) {
if(c==null||c===false) continue;
el.appendChild(typeof c===‘string’||typeof c===‘number’?document.createTextNode(String(c)):c);
}
return el;
}

let activeSheet=null;

function initWeekPlan() {
weekPlan=APP.roster.filter(w=>w.status===‘active’).map(w=>({wid:w.id,role:w.role,action:null}));
}
initWeekPlan();

function closeSheet(){if(activeSheet){activeSheet.remove();activeSheet=null;}}

function maybeCrisis(s) {
const stepId=road[s]&&road[s].id;
if(Math.random()<(road[s]&&road[s].type===‘ppv’?.70:.40)){
const ev=buildCrisis(stepId,APP.roster,plan,APP.promo);
if(ev){crisis=ev;rebuild();}
}
}

async function doStart() {
phase=‘gen’; rebuild();
plan=await generateRoadPlan(APP.roster);
if(plan&&plan.chaos&&plan.chaos.who) {
APP.roster=APP.roster.map(w=>w.id===plan.chaos.who?{…w,status:‘injured’,mom:clamp(w.mom-20)}:w);
}
phase=‘active’; step=0; initWeekPlan(); rebuild();
setTimeout(()=>maybeCrisis(0),300);
}

async function doSubmit() {
if(loading) return;
loading=true; rebuild();
const s=road[step];
const actionsData=weekPlan.filter(e=>e.action).map(e=>({wid:e.wid,cat:e.action.cat,action:e.action.action,role:e.role}));
if(s.type===‘ppv’&&ppvStip) actionsData.forEach(a=>{if(a.action){a.action={…a.action,mom:(a.action.mom||0)+3,heat:(a.action.heat||0)+3};}});
const r=await callCrowd(actionsData,APP.roster,APP.difficulty);
APP.roster=APP.roster.map(w=>{
const e=weekPlan.find(p=>p.wid===w.id);
if(!e||!e.action) return w;
return {…w,mom:clamp(w.mom+Math.round(e.action.action.mom/2))};
});
if(titleChange&&titleChange.fromId&&titleChange.toId) APP.roster=applyTitleChange(APP.roster,titleChange);
weekResults.push({…r,_label:s.label,stepId:s.id});
pushStars(r.stars);
lastResult=r; crisis=null; ppvStip=null; titleChange=null;
weekPlan=weekPlan.map(e=>({…e,action:null}));
loading=false;
const next=step+1;
if(next>=road.length){phase=‘final’;rebuild();}
else{step=next;rebuild();setTimeout(()=>maybeCrisis(next),200);}
}

function rebuild() {
closeSheet();
if(phase===‘intro’) { buildIntro(); return; }
if(phase===‘gen’) { buildGen(); return; }
if(phase===‘final’) { buildFinal(); return; }
buildActive();
}
